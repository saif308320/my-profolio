<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zervte | Animated Login & Register</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .container {
      width: 380px;
      height: 500px;
      perspective: 1000px;
    }

    .card {
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      transform-style: preserve-3d;
      transition: transform 1s;
      position: relative;
    }

    .container.active .card {
      transform: rotateY(180deg);
    }

    .form {
      position: absolute;
      width: 100%;
      height: 100%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backface-visibility: hidden;
    }

    .form h2 {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00f0ff;
    }

    .inputBox {
      position: relative;
      width: 100%;
      margin-bottom: 25px;
    }

    .inputBox input {
      width: 100%;
      padding: 10px 15px;
      background: transparent;
      border: none;
      outline: none;
      border-bottom: 2px solid #fff;
      color: #fff;
      font-size: 1rem;
      transition: 0.4s;
    }

    .inputBox input:focus {
      border-bottom: 2px solid #00f0ff;
      box-shadow: 0 0 10px #00f0ff;
    }

    .inputBox label {
      position: absolute;
      top: 10px;
      left: 15px;
      color: #aaa;
      pointer-events: none;
      transition: 0.3s;
    }

    .inputBox input:focus ~ label,
    .inputBox input:valid ~ label {
      top: -12px;
      left: 10px;
      color: #00f0ff;
      font-size: 0.8rem;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #00f0ff, #0078ff);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 15px #00f0ff;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #0078ff, #00f0ff);
      box-shadow: 0 0 25px #00f0ff;
      transform: scale(1.05);
    }

    .toggle {
      margin-top: 20px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: underline;
      transition: 0.3s;
    }

    .toggle:hover {
      color: #00f0ff;
    }

    .register {
      transform: rotateY(180deg);
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .container::before {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #00f0ff33, transparent);
      top: -50px;
      right: -50px;
      border-radius: 50%;
      animation: floating 4s ease-in-out infinite;
    }

    .container::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #0078ff33, transparent);
      bottom: -50px;
      left: -50px;
      border-radius: 50%;
      animation: floating 6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="card">
      <!-- Login Form -->
      <div class="form login">
        <h2>Login</h2>
        <div class="inputBox">
          <input type="text" required />
          <label>Username</label>
        </div>
        <div class="inputBox">
          <input type="password" required />
          <label>Password</label>
        </div>
        <button>Login</button>
        <div class="toggle" onclick="flip()">Create Account</div>
      </div>

      <!-- Register Form -->
      <div class="form register">
        <h2>Register</h2>
        <div class="inputBox">
          <input type="text" required />
          <label>Full Name</label>
        </div>
        <div class="inputBox">
          <input type="email" required />
          <label>Email</label>
        </div>
        <div class="inputBox">
          <input type="password" required />
          <label>Password</label>
        </div>
        <button>Register</button>
        <div class="toggle" onclick="flip()">Already have an account?</div>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('container');
    function flip() {
      container.classList.toggle('active');
    }
  </script>
</body>
</html>
