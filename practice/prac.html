<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Luxury Happy New Year 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{
  background:radial-gradient(circle at center,#1a1a1a 0%,#000 70%);
  overflow:hidden;
  font-family:'Poppins',system-ui,Arial,sans-serif;
}
.center{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:3;
}
#bye{
  font-size:4.8rem;
  font-weight:600;
  color:#aaa;
  opacity:0;
  transform:translateY(40px);
  transition:all 1.5s ease;
}
#count{
  font-size:10rem;
  font-weight:900;
  background:linear-gradient(180deg,#fff2b2,#ffd700,#ff9f1c);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 60px rgba(255,215,0,.45);
  opacity:0;
  transform:scale(.6);
  transition:all .6s ease;
}
#welcome{
  font-size:6rem;
  font-weight:900;
  background:linear-gradient(90deg,#fff,#ffd700,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 70px rgba(255,215,0,.7);
  opacity:0;
  transform:scale(.3);
  transition:all 1.4s cubic-bezier(.19,1,.22,1);
}
.show{opacity:1!important;transform:none!important}
canvas{position:fixed;inset:0;z-index:1}
</style>
</head>
<body>

<div class="center">
  <div id="bye">Goodbye&nbsp;2025</div>
  <div id="count">10</div>
  <div id="welcome">HAPPY&nbsp;NEW&nbsp;YEAR&nbsp;2026</div>
</div>

<canvas id="fx"></canvas>

<script>
/* ===== CINEMATIC BOMB SOUND ===== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
function bombSound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120,audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+0.6);
  gain.gain.setValueAtTime(1,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+0.6);
}

/* ===== PREMIUM FIREWORKS ===== */
const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener('resize',resize);

let particles=[];
function firework(){
  const x=Math.random()*canvas.width;
  const y=Math.random()*canvas.height*0.45;
  for(let i=0;i<160;i++){
    particles.push({
      x,y,
      a:Math.random()*Math.PI*2,
      s:Math.random()*7+2,
      l:140,
      h:Math.random()*360,
      r:Math.random()*2+1.5
    });
  }
  bombSound();
}
function animate(){
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=Math.cos(p.a)*p.s;
    p.y+=Math.sin(p.a)*p.s;
    p.l--;
    ctx.fillStyle=`hsl(${p.h},100%,60%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    if(p.l<=0)particles.splice(i,1);
  });
  requestAnimationFrame(animate);
}
animate();

/* ===== TIMELINE ===== */
const bye=document.getElementById('bye');
const count=document.getElementById('count');
const welcome=document.getElementById('welcome');

setTimeout(()=>bye.classList.add('show'),400);

let t=10;
setTimeout(()=>{
  count.classList.add('show');
  count.textContent=t;
  const timer=setInterval(()=>{
    firework();
    t--;
    count.textContent=t;
    if(t<=0){
      clearInterval(timer);
      bye.classList.remove('show');
      count.classList.remove('show');
      setTimeout(()=>{
        welcome.classList.add('show');
        setInterval(firework,500);
      },700);
    }
  },1000);
},2200);
</script>

</body>
</html>
