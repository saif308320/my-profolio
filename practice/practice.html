<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ultra Premium New Year 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{
  background:radial-gradient(circle at center,#111 0%,#000 70%);
  overflow:hidden;
  font-family:'Poppins',system-ui,Arial,sans-serif;
}
.center{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:2;
}

#bye{
  font-size:4.5rem;
  font-weight:700;
  color:#bbb;
  opacity:0;
  transform:translateY(30px);
  transition:all 1.5s ease;
}

#count{
  font-size:9rem;
  font-weight:900;
  background:linear-gradient(180deg,#ffd700,#ff9f1c);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(255,215,0,.35);
  opacity:0;
  transform:scale(.7);
  transition:all .6s ease;
}

#welcome{
  font-size:5.5rem;
  font-weight:900;
  background:linear-gradient(90deg,#fff,#ffd700,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 50px rgba(255,215,0,.6);
  opacity:0;
  transform:scale(.4);
  transition:all 1.2s ease;
}

.show{
  opacity:1 !important;
  transform:none !important;
}

canvas{
  position:fixed;
  inset:0;
  z-index:1;
}
</style>
</head>
<body>

<div class="center">
  <div id="bye">Goodbye&nbsp;2025</div>
  <div id="count">10</div>
  <div id="welcome">WELCOME&nbsp;2026</div>
</div>

<canvas id="fx"></canvas>

<script>
/* ===== FIREWORKS ===== */
const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener('resize',resize);

let parts=[];
function firework(){
  const x=Math.random()*canvas.width;
  const y=Math.random()*canvas.height*0.5;
  for(let i=0;i<120;i++){
    parts.push({x,y,a:Math.random()*Math.PI*2,s:Math.random()*6+2,l:120,h:Math.random()*360});
  }
}
function animate(){
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  parts.forEach((p,i)=>{
    p.x+=Math.cos(p.a)*p.s;
    p.y+=Math.sin(p.a)*p.s;
    p.l--;
    ctx.fillStyle=`hsl(${p.h},100%,60%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,2.2,0,Math.PI*2);ctx.fill();
    if(p.l<=0)parts.splice(i,1);
  });
  requestAnimationFrame(animate);
}
animate();

/* ===== TIMELINE ===== */
const bye=document.getElementById('bye');
const count=document.getElementById('count');
const welcome=document.getElementById('welcome');

// show goodbye
setTimeout(()=>bye.classList.add('show'),300);

let t=10;
setTimeout(()=>{
  count.classList.add('show');
  count.textContent=t;

  const timer=setInterval(()=>{
    firework();
    t--;
    count.textContent=t;
    if(t<=0){
      clearInterval(timer);
      bye.classList.remove('show');
      count.classList.remove('show');
      setTimeout(()=>{
        welcome.classList.add('show');
        setInterval(firework,600);
      },600);
    }
  },1000);
},2000);
</script>

</body>
</html>
