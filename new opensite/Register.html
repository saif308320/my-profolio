<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zervte — Register</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-engine@3/tsparticles.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-shape-squared@3/+esm"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg1:#0b0420; --bg2:#0f0a22; --neonA:#7b4cff; --neonB:#3de0d6; --text:#eaf6ff }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,system-ui; color:var(--text);
    background: radial-gradient(700px 300px at 10% 10%, rgba(123,76,255,0.06), transparent 8%),
                radial-gradient(600px 260px at 90% 80%, rgba(61,224,214,0.04), transparent 8%),
                linear-gradient(180deg,var(--bg1),var(--bg2)); -webkit-font-smoothing:antialiased;}

  #tsparticles{position:absolute;inset:0;z-index:0}
  .gLayer{position:absolute;inset:-20% -20% -20% -20%;z-index:1;mix-blend-mode:screen;filter:blur(48px)}
  .g1{background:linear-gradient(120deg, rgba(123,76,255,0.08), rgba(61,224,214,0.03))}
  .g2{background:linear-gradient(90deg, rgba(61,224,214,0.04), rgba(123,76,255,0.03));opacity:0.6}

  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
  .card{width:760px;max-width:96%;border-radius:18px;padding:26px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(0,0,0,0.06));
    border:1px solid rgba(255,255,255,0.03);box-shadow:0 40px 120px rgba(2,6,23,0.66);backdrop-filter: blur(12px) saturate(120%);position:relative;z-index:4}
  .head{display:flex;align-items:center;gap:14px}
  .logoBox{width:72px;height:72px;border-radius:14px;background:linear-gradient(135deg,var(--neonA),var(--neonB));display:grid;place-items:center;box-shadow:0 22px 60px rgba(61,224,214,0.06)}
  .logoBox img{width:68%}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .field{display:flex;flex-direction:column;gap:8px}
  .input{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.012), rgba(0,0,0,0.06));border:1px solid rgba(255,255,255,0.03)}
  .input input{border:0;background:transparent;color:var(--text);outline:none;width:100%}

  .pw-meter{height:8px;background:rgba(255,255,255,0.03);border-radius:8px;overflow:hidden;margin-top:8px}
  .pw-fill{height:100%;width:0%;transition:width .36s ease;background:linear-gradient(90deg,#ff6a00,#ffd700,#00e676)}

  .actions{display:flex;gap:12px;margin-top:12px}
  .btn{flex:1;padding:12px;border-radius:12px;border:0;cursor:pointer;font-weight:700}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text)}
  .btn.primary{background:linear-gradient(90deg,var(--neonB),var(--neonA));color:#001827;box-shadow:0 18px 48px rgba(123,76,255,0.12)}
  .links{text-align:center;margin-top:12px;opacity:.9}
  .toast{position:fixed;right:20px;top:20px;padding:10px 14px;border-radius:10px;background:linear-gradient(90deg,#001826,#0b2740);color:#bff3ff;display:none;z-index:999}

  @media (max-width:920px){ .grid{grid-template-columns:1fr} .card{width:92%} .logoBox{width:56px;height:56px} }
</style>
</head>
<body>
  <div id="tsparticles"></div>
  <div class="gLayer g1"></div>
  <div class="gLayer g2"></div>

  <div class="stage">
    <main class="card" role="main" aria-label="Create account">
      <div class="head">
        <div class="logoBox"><img src="logo.png" alt="Zervte logo"></div>
        <div>
          <h2 style="margin:0">Create account</h2>
          <div style="opacity:.9;font-size:13px">Register to start using Zervte</div>
        </div>
      </div>

      <form id="registerForm" autocomplete="on" novalidate>
        <div class="grid">
          <div class="field">
            <label for="name">Full name</label>
            <div class="input"><input id="name" type="text" placeholder="Your full name" required></div>
          </div>
          <div class="field">
            <label for="username">Username</label>
            <div class="input"><input id="username" type="text" placeholder="username (optional)"></div>
          </div>
        </div>

        <div style="margin-top:10px" class="field">
          <label for="emailR">Email</label>
          <div class="input"><input id="emailR" type="email" placeholder="you@company.com" required></div>
        </div>

        <div class="grid">
          <div class="field">
            <label for="passwordR">Password</label>
            <div class="input"><input id="passwordR" type="password" placeholder="Minimum 6 characters" required minlength="6"></div>
            <div class="pw-meter"><div id="pwFill" class="pw-fill"></div></div>
          </div>
          <div class="field">
            <label for="passwordConfirm">Confirm password</label>
            <div class="input"><input id="passwordConfirm" type="password" placeholder="Repeat password" required></div>
          </div>
        </div>

        <div class="actions">
          <button type="button" class="btn ghost" id="toLogin">Already have account</button>
          <button type="submit" class="btn primary" id="registerBtn">Create account</button>
        </div>

        <div class="links">Already registered? <a href="login.html" style="color:var(--neonB);font-weight:700;text-decoration:none">Sign in</a></div>
      </form>
    </main>
  </div>

  <div id="toast" class="toast"></div>

<script>
/* ========== tsparticles (same cinematic config) ========== */
tsParticles.load("tsparticles", {
  fpsLimit: 60,
  background: { color: { value: "transparent" } },
  fullScreen: { enable: false },
  particles: {
    number: { value: 130, density: { enable: true, area: 900 } },
    color: { value: ["#7b4cff","#3de0d6","#9f7cff"] },
    shape: { type: "circle" },
    opacity: { value: { min: 0.02, max: 0.18 }, animation: { enable: true, speed: 0.6, minimumValue: 0.02 } },
    size: { value: { min: 0.4, max: 2.2 } },
    move: { enable: true, speed: 0.22, direction: "none", outModes: "out", random: true },
    links: { enable: false }
  },
  detectRetina: true
});

/* ========== GSAP entrances ========== */
gsap.from(".card", { y: 24, opacity: 0, duration: 0.8, ease: "power3.out" });
gsap.from(".logoBox", { scale: 0.96, opacity: 0, duration: 0.7, ease: "back.out(1.2)" });

/* password strength meter */
const pw = document.getElementById('passwordR'), fill = document.getElementById('pwFill');
pw && pw.addEventListener('input', ()=> {
  const v = pw.value || '';
  let s = 0;
  if(v.length >= 6) s++;
  if(/[A-Z]/.test(v)) s++;
  if(/[0-9]/.test(v)) s++;
  if(/[^A-Za-z0-9]/.test(v)) s++;
  fill.style.width = (s/4*100) + '%';
});

/* navigation micro */
document.getElementById('toLogin').addEventListener('click', ()=> {
  gsap.to(".card", { scale: 0.98, y: 8, duration: 0.14 });
  setTimeout(()=> location.href = 'login.html', 160);
});

/* register demo logic (localStorage) */
function toast(msg,t=2200){ const el=document.getElementById('toast'); el.textContent = msg; el.style.display='block'; clearTimeout(el._hid); el._hid=setTimeout(()=> el.style.display='none', t); }
document.getElementById('registerForm').addEventListener('submit', e=>{
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('emailR').value.trim().toLowerCase();
  const pass = document.getElementById('passwordR').value;
  const pass2 = document.getElementById('passwordConfirm').value;
  if(!name || !email || !pass || !pass2){ toast('Please fill all required fields'); return; }
  if(pass.length < 6){ toast('Password must be at least 6 characters'); return; }
  if(pass !== pass2){ toast('Passwords do not match'); return; }
  let users = JSON.parse(localStorage.getItem('zervteUsers') || '{}');
  if(users[email]){ toast('Email already registered'); return; }
  users[email] = { name, email, password: pass, created: Date.now() };
  localStorage.setItem('zervteUsers', JSON.stringify(users));
  toast('Account created — Redirecting to login...');
  setTimeout(()=> location.href='login.html', 900);
});
</script>
</body>
</html>
