<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gradient Navbar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#081418;
  font-family:Segoe UI, sans-serif;
}

/* NAVBAR */
.navbar{
  width:90%;
  margin:30px auto;
  padding:14px 22px;
  background:linear-gradient(135deg,#0a4b63,#0dcaf0);
  border-radius:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 10px 30px rgba(13,202,240,.35);
}

/* LEFT */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  color:#0b1f26;
}

.dot{
  width:10px;
  height:10px;
  background:#0b1f26;
  border-radius:50%;
}

/* CENTER MENU */
.menu{
  background:rgba(255,255,255,.35);
  padding:10px 22px;
  border-radius:40px;
  display:flex;
  gap:28px;
}

.menu a{
  text-decoration:none;
  color:#0b1f26;
  font-size:15px;
  font-weight:500;
  opacity:.8;
}

.menu a:hover{
  opacity:1;
}

/* RIGHT */
.actions{
  display:flex;
  align-items:center;
  gap:14px;
}

.talk-btn{
  padding:10px 22px;
  border:none;
  border-radius:30px;
  background:#0b1f26;
  color:#fff;
  cursor:pointer;
}

.icon{
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(255,255,255,.35);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav class="navbar">
  <!-- LEFT -->
  <div class="logo">
    <div class="dot"></div>
    <span>PORTFOLIO</span>
  </div>

  <!-- CENTER -->
  <div class="menu">
    <a href="#">About</a>
    <a href="#">Skills</a>
    <a href="#">Projects</a>
    <a href="#">Testimonials</a>
  </div>

  <!-- RIGHT -->
  <div class="actions">
    <button class="talk-btn">Let’s Talk</button>
    <div class="icon">🌙</div>
  </div>
</nav>

</body>
</html>
