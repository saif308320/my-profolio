<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    font-family: 'Inter', sans-serif;
  }

  .kinetic-wrap {
    position: relative;
    overflow: hidden;
    padding: 2px;
  }

  .kinetic-btn {
    position: relative;
    padding: 24px 60px;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    background: transparent;
    border: 2px solid #fff;
    text-transform: uppercase;
    letter-spacing: 8px;
    cursor: pointer;
    transition: all 0.6s cubic-bezier(0.9, 0, 0.1, 1);
    mix-blend-mode: difference; /* Critical Logic */
  }

  /* The Liquid Slide Engine */
  .kinetic-btn::before {
    content: 'POWER'; /* Same as button text */
    position: absolute;
    inset: 0;
    background: #fff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateY(100%);
    transition: all 0.6s cubic-bezier(0.9, 0, 0.1, 1);
  }

  /* Hover Logic: Double Inversion */
  .kinetic-btn:hover {
    letter-spacing: 15px;
    padding-left: 67px; /* Compensate for spacing */
  }

  .kinetic-btn:hover::before {
    transform: translateY(0);
  }

  /* Subtle background pulse */
  .kinetic-btn::after {
    content: '';
    position: absolute;
    inset: -10px;
    border: 1px solid rgba(255,255,255,0);
    transition: 0.4s;
  }

  .kinetic-btn:hover::after {
    inset: -2px;
    border-color: rgba(255,255,255,0.5);
  }

  .kinetic-btn:active {
    transform: scale(0.9);
  }
</style>
</head>
<body>

  <div class="kinetic-wrap">
    <button class="kinetic-btn">POWER</button>
  </div>

</body>
</html>
