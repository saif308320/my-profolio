<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zervte — Login</title>

<!-- GSAP (animation) and tsparticles (particles) from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-engine@3/tsparticles.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-shape-squared@3/+esm"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles-updater-color@3/+esm"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0b0420; --bg2:#0f0a22;
    --neonA:#7b4cff; --neonB:#3de0d6;
    --glass: rgba(255,255,255,0.03);
    --muted: rgba(230,242,255,0.12);
    --text: #eaf6ff;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto;color:var(--text);
    background: radial-gradient(700px 300px at 10% 10%, rgba(123,76,255,0.06), transparent 8%),
                radial-gradient(600px 260px at 90% 80%, rgba(61,224,214,0.04), transparent 8%),
                linear-gradient(180deg,var(--bg1),var(--bg2)); -webkit-font-smoothing:antialiased;}

  /* full stage */
  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;position:relative;overflow:hidden}

  /* particles container covers background */
  #tsparticles{position:absolute;inset:0;z-index:0;pointer-events:none}

  /* cinematic gradient overlay layers */
  .gLayer{position:absolute;inset:-20%  -20% -20% -20%;z-index:1;mix-blend-mode:screen;filter:blur(48px);opacity:0.9}
  .g1{background:linear-gradient(120deg, rgba(123,76,255,0.08), rgba(61,224,214,0.03));transform:rotate(-8deg)}
  .g2{background:linear-gradient(90deg, rgba(61,224,214,0.04), rgba(123,76,255,0.03));filter:blur(72px);opacity:0.65}

  /* container for panels */
  .wrap{position:relative;z-index:4;display:flex;gap:36px;align-items:stretch;max-width:1100px;width:100%;padding:12px}

  /* left brand panel */
  .brandPanel{
    width:380px;border-radius:18px;padding:34px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(0,0,0,0.06));
    border:1px solid rgba(255,255,255,0.03);box-shadow:0 40px 120px rgba(2,6,23,0.6);backdrop-filter: blur(12px) saturate(120%);
    display:flex;flex-direction:column;gap:16px;overflow:hidden;position:relative;
  }
  .logoWrap{display:flex;align-items:center;gap:14px}
  .logoBox{width:88px;height:88px;border-radius:16px;background:linear-gradient(135deg,var(--neonA),var(--neonB));display:grid;place-items:center;box-shadow:0 22px 60px rgba(61,224,214,0.06);transform:translateZ(40px)}
  .logoBox img{width:72%}

  .brand h3{margin:0;font-size:18px}
  .brand p{margin:0;opacity:0.86;font-size:13px;color:rgba(230,242,255,0.9)}

  .featureList{margin-top:8px;font-size:14px;color:rgba(230,242,255,0.9)}
  .featureList b{display:block;margin-bottom:8px;font-size:15px}

  /* right form card */
  .card{flex:1;border-radius:18px;padding:26px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(0,0,0,0.06));
    border:1px solid rgba(255,255,255,0.03);box-shadow:0 40px 120px rgba(2,6,23,0.66);backdrop-filter: blur(12px) saturate(120%);
    position:relative;overflow:hidden;min-height:420px}
  .cardHeader{display:flex;justify-content:space-between;align-items:center}
  .cardHeader h2{margin:0;font-size:20px}
  .cardHeader span{opacity:0.86;font-weight:700}

  form{margin-top:14px;display:grid;gap:12px}
  label{font-size:13px;opacity:0.9}
  .field{display:flex;flex-direction:column;gap:8px}
  .input{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.012), rgba(0,0,0,0.06));
    border:1px solid rgba(255,255,255,0.03);transition:box-shadow .15s, transform .12s, border-color .15s;position:relative}
  .input input{border:0;background:transparent;outline:none;color:var(--text);font-size:15px;width:100%}
  .input:focus-within{box-shadow:0 18px 60px rgba(123,76,255,0.06);border-color:rgba(123,76,255,0.12);transform:translateY(-2px)}

  .cta{display:flex;gap:12px;margin-top:10px}
  .btn{flex:1;padding:12px;border-radius:12px;border:0;cursor:pointer;font-weight:700;letter-spacing:.2px}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text)}
  .btn.primary{background:linear-gradient(90deg,var(--neonB),var(--neonA));color:#001827;box-shadow:0 18px 48px rgba(123,76,255,0.14)}
  .btn.primary:hover{transform:translateY(-3px)}

  .minor{font-size:13px;text-align:center;margin-top:12px;opacity:0.85}
  a.link{color:var(--neonB);font-weight:700;text-decoration:none}

  /* subtle corner glow */
  .cornerGlow{position:absolute;right:-120px;top:-90px;width:460px;height:460px;border-radius:50%;background:conic-gradient(from 120deg, rgba(123,76,255,0.06), rgba(61,224,214,0.03));filter:blur(40px);opacity:.7;z-index:2;pointer-events:none}

  /* toast */
  .toast{position:fixed;right:20px;top:20px;padding:10px 14px;border-radius:10px;background:linear-gradient(90deg,#001826,#0b2740);color:#bff3ff;display:none;z-index:999}

  @media (max-width:980px){ .wrap{flex-direction:column-reverse;align-items:center}.brandPanel{width:92%}.card{width:92%} }
</style>
</head>
<body>
  <div id="tsparticles"></div>
  <div class="gLayer g1"></div>
  <div class="gLayer g2"></div>

  <div class="stage">
    <div class="wrap">
      <!-- BRAND PANEL -->
      <aside class="brandPanel" aria-hidden="false">
        <div class="logoWrap">
          <div class="logoBox" id="logoBox"><img src="logo.png" alt="Zervte logo" id="brandImg"></div>
          <div class="brand">
            <h3>Zervte</h3>
            <p>Premium Dashboard & tools</p>
          </div>
        </div>
        <div class="featureList">
          <b>Fast. Clean. Brand-first.</b>
          Secure sign-in with smooth micro-interactions — built for product-level polish.
        </div>
        <div style="flex:1"></div>
        <div style="opacity:.9;font-size:13px">Built with motion-first UI and cinematic background.</div>
      </aside>

      <!-- FORM CARD -->
      <main class="card" role="main" aria-label="Sign in">
        <div class="cardHeader">
          <div>
            <h2>Welcome back</h2>
            <div style="opacity:.88;font-size:13px">Sign in to your account</div>
          </div>
          <span>Demo</span>
        </div>

        <form id="loginForm" autocomplete="on" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <div class="input">
              <svg width="16" height="16" viewBox="0 0 24 24" style="opacity:.9"><path fill="currentColor" d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <input id="email" type="email" placeholder="you@company.com" required>
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input">
              <svg width="16" height="16" viewBox="0 0 24 24" style="opacity:.9"><path fill="currentColor" d="M12 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6-7h-1V7a5 5 0 0 0-10 0v3H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2z"/></svg>
              <input id="password" type="password" placeholder="Minimum 6 characters" required minlength="6">
            </div>
            <div style="font-size:12px;opacity:.78;margin-top:6px">Press Enter to submit</div>
          </div>

          <div class="cta">
            <button type="button" class="btn ghost" id="toRegister">Create account</button>
            <button type="submit" class="btn primary" id="loginBtn">Sign in</button>
          </div>

          <div class="minor">Don't have an account? <a class="link" href="register.html">Register</a></div>
        </form>
      </main>
    </div>
    <div class="cornerGlow" aria-hidden="true"></div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
/* ========== tsparticles config (cinematic subtle particles) ========== */
tsParticles.load("tsparticles", {
  fpsLimit: 60,
  background: { color: { value: "transparent" } },
  fullScreen: { enable: false },
  particles: {
    number: { value: 120, density: { enable: true, area: 800 } },
    color: { value: ["#7b4cff","#3de0d6","#9f7cff"] },
    shape: { type: "circle" },
    opacity: { value: { min: 0.02, max: 0.18 }, animation: { enable: true, speed: 0.6, minimumValue: 0.02 } },
    size: { value: { min: 0.4, max: 2.2 } },
    move: { enable: true, speed: 0.2, direction: "none", outModes: "out", random: true },
    links: { enable: false }
  },
  detectRetina: true
});

/* ========== GSAP animations: logo reveal + card entrance ========== */
const logoBox = document.getElementById('logoBox');
const brandImg = document.getElementById('brandImg');
const card = document.querySelector('.card');
const brandPanel = document.querySelector('.brandPanel');

gsap.set([card, brandPanel], { y: 30, opacity: 0, skewY: 0.5 });
gsap.set(logoBox, { scale: 0.92, rotate: -6, opacity: 0 });

const tl = gsap.timeline({ delay: 0.15, defaults: { ease: "power3.out" } });
tl.to(logoBox, { opacity: 1, scale: 1, rotate: 0, duration: 0.7 })
  .from(brandImg, { y: 10, opacity: 0, duration: 0.6 }, "-=0.45")
  .to(brandPanel, { y: 0, opacity: 1, duration: 0.7 }, "-=0.45")
  .to(card, { y: 0, opacity: 1, duration: 0.8 }, "-=0.55");

/* logo micro-pulse */
gsap.to(logoBox, { scale: 1.01, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1.2 });

/* micro tilt on mouse */
logoBox.addEventListener('mousemove', e => {
  const r = logoBox.getBoundingClientRect();
  const x = (e.clientX - r.left - r.width/2)/(r.width/2);
  const y = (e.clientY - r.top - r.height/2)/(r.height/2);
  gsap.to(logoBox, { rotationY: x*6, rotationX: -y*6, duration: 0.25, transformPerspective: 700 });
});
logoBox.addEventListener('mouseleave', ()=> gsap.to(logoBox, { rotationY:0, rotationX:0, duration:0.5 }));

/* navigation with micro animation */
document.getElementById('toRegister').addEventListener('click', ()=> {
  gsap.to(card, { scale: 0.98, y: 8, duration: 0.14 });
  setTimeout(()=> location.href = 'register.html', 180);
});

/* ========== Demo auth: localStorage ========= */
function toast(msg, t=2200){ const el = document.getElementById('toast'); el.textContent = msg; el.style.display='block'; clearTimeout(el._hid); el._hid=setTimeout(()=> el.style.display='none', t); }

document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pass = document.getElementById('password').value;
  if(!email || !pass){ toast('Please enter email and password'); return; }
  const users = JSON.parse(localStorage.getItem('zervteUsers') || '{}');
  if(!users[email] || users[email].password !== pass){
    toast('Email or password is incorrect');
    gsap.fromTo(card, { x: -6 }, { x: 0, duration: 0.26, ease: 'elastic.out(1, .9)' });
    return;
  }
  toast('Welcome back, ' + users[email].name);
  localStorage.setItem('zervteSession', JSON.stringify({ email, name: users[email].name, ts: Date.now() }));
  setTimeout(()=> toast('Redirecting...'), 700);
});
</script>
</body>
</html>
